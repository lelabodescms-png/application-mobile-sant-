name: Android Screenshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented screenshot test and collect PNGs
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            ./gradlew connectedDebugAndroidTest --stacktrace
            mkdir -p screenshots
            adb pull /sdcard/01_accueil.png screenshots/
            adb pull /sdcard/02_poids.png screenshots/
            adb pull /sdcard/03_journal.png screenshots/
            adb pull /sdcard/04_reglages.png screenshots/

      - name: Upload screenshots as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: play-store-screenshots
          path: screenshots/
          if-no-files-found: warn

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTests/connected/
          if-no-files-found: ignore

      - name: Commit screenshots to the repo
        run: |
          mkdir -p store-listing/screenshots
          cp screenshots/*.png store-listing/screenshots/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add store-listing/screenshots/
          if ! git diff --cached --quiet; then
            git commit -m "Update Play Store screenshots [skip ci]"
            git push
          else
            echo "No screenshot changes to commit"
          fi
