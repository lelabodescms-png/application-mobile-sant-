# =============================================================================
# Fichier de configuration du matching — modifiable librement, sans toucher au code.
# Toutes les comparaisons se font en minuscules et sans accents (voir filters.py),
# donc pas besoin de dupliquer les variantes accentuées/non accentuées.
# =============================================================================

# --- Règles de détection "remote" ---
remote:
  # Un seul de ces mots-clés dans le titre/description suffit à considérer l'offre comme remote.
  inclusion:
    - remote
    - teletravail
    - full remote
    - 100% remote
    - a distance
    - distanciel
    - work from home
    - fully remote
    - anywhere

  # Si un de ces mots apparaît, l'offre est exclue par défaut (sauf exception ci-dessous).
  exclusion:
    - hybride
    - sur site
    - presentiel
    - on-site
    - onsite

  # Si un de ces mots apparaît EN PLUS d'un mot d'exclusion, l'offre est quand même gardée.
  exception_si_present:
    - teletravail possible
    - remote possible
    - full remote possible

